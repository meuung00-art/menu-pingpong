.content{

  flex-direction:column;

  display:flex;flex-direction:column;
  align-items:center;justify-content:center;

}
.result-emoji{font-size:44px;margin-bottom:10px;}
.result-name{font-size:28px;font-weight:600;letter-spacing:-0.5px;margin-bottom:4px;}
.result-cat{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.hint{font-size:13px;color:rgba(255,255,255,0.3);}
.btn{
  width:100%;padding:16px;
  background:#fff;color:#000;
  border:none;border-radius:12px;
  font-size:15px;font-weight:600;
  cursor:pointer;margin-bottom:28px;
  transition:opacity .15s,transform .1s;
  font-family:inherit;
}
.btn:hover{opacity:0.88;}
.btn:active{transform:scale(0.98);}
.btn:disabled{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);cursor:not-allowed;}
.cats{
  display:flex;flex-wrap:wrap;gap:6px;
  justify-content:center;margin-bottom:20px;width:100%;
}
.cat{
  padding:6px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.15);
  background:transparent;color:rgba(255,255,255,0.5);
  font-size:12px;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.cat.on{background:#fff;color:#000;border-color:#fff;font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;}
.item{
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:10px 6px;
  text-align:center;font-size:12px;
  color:rgba(255,255,255,0.45);
  font-family:inherit;transition:all .2s;
}
.item.pick{border-color:rgba(255,255,255,0.6);color:#fff;font-weight:600;background:rgba(255,255,255,0.08);}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.pop{animation:pop .3s ease;}

const all=[
  {n:'삼겹살',e:'🥩',c:'한식'},{n:'된장찌개',e:'🍲',c:'한식'},{n:'김치찌개',e:'🍲',c:'한식'},
  {n:'불고기',e:'🥩',c:'한식'},{n:'비빔밥',e:'🍚',c:'한식'},{n:'순두부찌개',e:'🍲',c:'한식'},
  {n:'갈비탕',e:'🍜',c:'한식'},{n:'냉면',e:'🍜',c:'한식'},{n:'초밥',e:'🍣',c:'일식'},
  {n:'라멘',e:'🍜',c:'일식'},{n:'돈카츠',e:'🍱',c:'일식'},{n:'우동',e:'🍜',c:'일식'},
  {n:'규동',e:'🍚',c:'일식'},{n:'짜장면',e:'🍝',c:'중식'},{n:'짬뽕',e:'🍜',c:'중식'},
  {n:'탕수육',e:'🍖',c:'중식'},{n:'마라탕',e:'🌶️',c:'중식'},{n:'딤섬',e:'🥟',c:'중식'},
  {n:'파스타',e:'🍝',c:'양식'},{n:'피자',e:'🍕',c:'양식'},{n:'스테이크',e:'🥩',c:'양식'},
  {n:'리조또',e:'🍚',c:'양식'},{n:'햄버거',e:'🍔',c:'양식'},{n:'떡볶이',e:'🌶️',c:'분식'},
  {n:'순대',e:'🌭',c:'분식'},{n:'튀김',e:'🍟',c:'분식'},{n:'김밥',e:'🍙',c:'분식'},
  {n:'라면',e:'🍜',c:'분식'},
];
let cat='전체',picked=null;
function filtered(){return cat==='전체'?all:all.filter(m=>m.c===cat);}
function setCat(c,btn){
  cat=c;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderGrid();
}
function renderGrid(){
  document.getElementById('grid').innerHTML=filtered().map(m=>
    `<div class="item${picked&&picked.n===m.n?' pick':''}">${m.e} ${m.n}</div>`
  ).join('');
}
function spin(){
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='선택 중...';
  const list=filtered();let i=0,tot=16;
  const iv=setInterval(()=>{
    const r=list[Math.floor(Math.random()*list.length)];
    showResult(r,false);i++;
    if(i>=tot){
      clearInterval(iv);
      const final=list[Math.floor(Math.random()*list.length)];
      picked=final;showResult(final,true);renderGrid();
      btn.disabled=false;btn.textContent='다시 뽑기';
    }
  },80);
}
function showResult(m,final){
  const b=document.getElementById('rbox');
  if(final){
    b.innerHTML=`<div class="result-emoji">${m.e}</div><div class="result-name">${m.n}</div><div class="result-cat">${m.c}</div>`;
    b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');
  }else{
    b.innerHTML=`<div class="result-emoji" style="opacity:.5">${m.e}</div><div class="result-name" style="opacity:.4">${m.n}</div>`;
  }
}
renderGrid();
</script>
</body>
</html>
